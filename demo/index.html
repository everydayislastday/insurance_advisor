<html lang="zh-CN">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFCD00;
    --yellow-dark: #E6B800;
    --bg: #F5F6FA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --bubble-user: #FFCD00;
    --bubble-bot: #FFFFFF;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--yellow);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(255,205,0,0.4);
    flex-shrink: 0;
    position: relative;
  }
  .header-avatar {
    width: 40px; height: 40px;
    background: var(--text);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 700; color: var(--text); }
  .header-status {
    font-size: 12px; color: #4B5563;
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px; background: #22C55E;
    border-radius: 50%; display: inline-block;
  }

  /* Scene tabs */
  .scene-tabs {
    display: flex; gap: 6px;
  }
  .scene-tab {
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scene-tab.active {
    background: var(--text); color: var(--yellow);
  }
  .scene-tab:not(.active) {
    background: rgba(0,0,0,0.1); color: var(--text);
  }
  .scene-tab:hover:not(.active) {
    background: rgba(0,0,0,0.18);
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 14px 16px 8px;
    font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .sidebar-item {
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; font-size: 13px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .sidebar-item:hover { background: var(--bg); color: var(--text); }
  .sidebar-item.active {
    background: #FFFBEA;
    border-left-color: var(--yellow-dark);
    color: var(--text);
    font-weight: 600;
  }
  .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .agent-badge {
    margin: 12px 16px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .agent-badge-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
  .agent-badge-name { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .agent-badge-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  /* Message bubbles */
  .msg { display: flex; gap: 10px; max-width: 80%; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.bot .msg-avatar { background: var(--yellow); }
  .msg.user .msg-avatar { background: var(--text); color: var(--yellow); }

  .msg-body { display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-body { align-items: flex-end; }

  .msg-name { font-size: 11px; color: var(--text-muted); padding: 0 4px; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px; line-height: 1.6;
    max-width: 100%;
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    border-radius: 4px 16px 16px 16px;
    box-shadow: var(--shadow);
    color: var(--text);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    border-radius: 16px 4px 16px 16px;
    color: var(--text);
    font-weight: 500;
  }

  /* Agent indicator */
  .agent-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-router { background: #EDE9FE; color: #7C3AED; }
  .tag-presale { background: #FEF3C7; color: #D97706; }
  .tag-aftersale { background: #DCFCE7; color: #16A34A; }
  .tag-retention { background: #FEE2E2; color: #DC2626; }

  /* Quick chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .chip {
    padding: 6px 14px; border-radius: 20px;
    background: white; border: 1.5px solid var(--yellow-dark);
    font-size: 13px; cursor: pointer; color: var(--text);
    transition: all 0.15s; font-weight: 500;
  }
  .chip:hover { background: var(--yellow); border-color: var(--yellow-dark); }

  /* Product card */
  .product-card {
    background: white; border-radius: 12px;
    border: 1.5px solid var(--border);
    overflow: hidden; margin-top: 8px;
    box-shadow: var(--shadow);
  }
  .product-card-header {
    background: linear-gradient(135deg, var(--yellow) 0%, var(--yellow-dark) 100%);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .product-icon { font-size: 24px; }
  .product-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .product-tagline { font-size: 12px; color: #4B5563; margin-top: 1px; }
  .product-body { padding: 12px 16px; }
  .product-price {
    font-size: 22px; font-weight: 800; color: var(--text);
    display: flex; align-items: baseline; gap: 4px;
  }
  .product-price span { font-size: 13px; font-weight: 400; color: var(--text-muted); }
  .product-features { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .feature { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151; }
  .feature::before { content: "✓"; color: #22C55E; font-weight: 700; flex-shrink: 0; }
  .product-cta {
    margin-top: 12px; width: 100%;
    padding: 10px; background: var(--text); color: var(--yellow);
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .product-cta:hover { opacity: 0.85; }

  /* Policy summary card */
  .policy-card {
    background: white; border-radius: 12px;
    border: 1px solid var(--border);
    padding: 14px 16px; margin-top: 8px;
    box-shadow: var(--shadow);
  }
  .policy-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid var(--bg);
    font-size: 13px;
  }
  .policy-row:last-child { border-bottom: none; }
  .policy-label { color: var(--text-muted); }
  .policy-value { font-weight: 600; color: var(--text); }
  .policy-status-badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    background: #DCFCE7; color: #16A34A;
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px; background: white;
    border-radius: 4px 16px 16px 16px;
    box-shadow: var(--shadow); width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px; background: #9CA3AF;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 14px 20px 18px;
    background: var(--card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-box {
    flex: 1; padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 24px; font-size: 14px;
    outline: none; resize: none;
    font-family: inherit; line-height: 1.5;
    max-height: 100px; overflow-y: auto;
    transition: border-color 0.2s;
    color: var(--text);
  }
  .input-box:focus { border-color: var(--yellow-dark); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--yellow); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    transition: all 0.15s; box-shadow: 0 2px 8px rgba(255,205,0,0.5);
  }
  .send-btn:hover { background: var(--yellow-dark); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }

  /* Disclaimer */
  .disclaimer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 8px;
  }

  /* System message */
  .sys-msg {
    text-align: center; font-size: 12px; color: var(--text-muted);
    padding: 4px 12px; background: var(--bg);
    border-radius: 20px; align-self: center;
    border: 1px solid var(--border);
  }

  /* Scrollbar */
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 2px; }

  /* Fade in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg, .sys-msg { animation: fadeUp 0.25s ease; }
</style>
</head>

// ── State ──
let currentScene = 'presale';
let isTyping = false;

// ── DOM helpers ──
const $msgs = () => document.getElementById('messages');

function scrollBottom() {
  const el = $msgs();
  setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

function addSysMsg(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  $msgs().appendChild(el);
  scrollBottom();
}

function getTagClass(tag) {
  return { presale: 'tag-presale', aftersale: 'tag-aftersale', retention: 'tag-retention', router: 'tag-router' }[tag] || 'tag-router';
}

function addBotMsg(msg) {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const body = document.createElement('div');
  body.className = 'msg-body';

  if (msg.tag) {
    const tag = document.createElement('div');
    tag.className = 'agent-tag ' + getTagClass(msg.tag);
    tag.textContent = msg.tagLabel || msg.tag;
    body.appendChild(tag);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(msg.text);
  body.appendChild(bubble);

  // Product card
  if (msg.card) {
    const card = buildProductCard(msg.card);
    body.appendChild(card);
  }

  // Text 2 (after card)
  if (msg.text2) {
    const b2 = document.createElement('div');
    b2.className = 'bubble';
    b2.innerHTML = formatText(msg.text2);
    body.appendChild(b2);
  }

  // Policy card
  if (msg.policy) {
    const pc = buildPolicyCard(msg.policy);
    body.appendChild(pc);
  }

  // Chips — chips[] are the flow keys, chipLabels[] are the display text
  if (msg.chips && msg.chips.length) {
    const chipsEl = document.createElement('div');
    chipsEl.className = 'chips';
    msg.chips.forEach((key, i) => {
      const label = (msg.chipLabels && msg.chipLabels[i]) ? msg.chipLabels[i] : key;
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = label;
      chip.onclick = () => handleChip(key, label, chipsEl);
      chipsEl.appendChild(chip);
    });
    body.appendChild(chipsEl);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(body);
  $msgs().appendChild(wrap);
  scrollBottom();
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '👤';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  body.appendChild(bubble);

  wrap.appendChild(body);
  wrap.appendChild(avatar);
  $msgs().appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const typing = document.createElement('div');
  typing.className = 'typing';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'typing-dot';
    typing.appendChild(dot);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(typing);
  $msgs().appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function buildProductCard(card) {
  const c = document.createElement('div');
  c.className = 'product-card';
  c.innerHTML = `
    <div class="product-card-header">
      <div class="product-icon">${card.icon}</div>
      <div>
        <div class="product-name">${card.name}</div>
        <div class="product-tagline">${card.tagline}</div>
      </div>
    </div>
    <div class="product-body">
      <div class="product-price">${card.price}<span>${card.unit}</span></div>
      <div class="product-features">
        ${card.features.map(f => `<div class="feature">${f}</div>`).join('')}
      </div>
      <button class="product-cta" onclick="handleChip('直接购买', null)">立即购买</button>
    </div>
  `;
  return c;
}

function buildPolicyCard(policy) {
  const c = document.createElement('div');
  c.className = 'policy-card';
  c.innerHTML = policy.rows.map(r => `
    <div class="policy-row">
      <span class="policy-label">${r.label}</span>
      ${r.isStatus
        ? `<span class="policy-value"><span class="policy-status-badge">有效</span></span>`
        : `<span class="policy-value">${r.value}</span>`
      }
    </div>
  `).join('');
  return c;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="background:#F3F4F6;padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace">$1</code>')
    .replace(/\n/g, '<br>');
}

// ── Sidebar nav ──
function setNav(activeId) {
  ['nav-router','nav-presale','nav-aftersale','nav-retention'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', id === activeId);
  });
}

function updateBadge(scene) {
  const s = SCENES[scene];
  document.getElementById('badge-name').textContent = s.agentName;
  document.getElementById('badge-desc').textContent = s.agentDesc;
}

// ── Scene loading ──
function loadScene(scene) {
  currentScene = scene;

  // Update tabs
  document.querySelectorAll('.scene-tab').forEach((t, i) => {
    t.classList.toggle('active', ['presale','aftersale','retention'][i] === scene);
  });

  // Clear messages
  $msgs().innerHTML = '';

  // Update sidebar
  const s = SCENES[scene];
  setNav('nav-router');
  updateBadge(scene);

  // Play greeting
  let delay = 0;
  s.greeting.forEach(msg => {
    setTimeout(() => {
      if (msg.type === 'sys') {
        addSysMsg(msg.text);
      } else {
        showTyping();
        setTimeout(() => {
          hideTyping();
          setNav(s.navActive);
          addBotMsg(msg);
        }, 800);
      }
    }, delay);
    delay += msg.type === 'sys' ? 400 : 1400;
  });
}

// ── Chip handler ──
// key: flow lookup key; label: display text shown in user bubble (defaults to key)
function handleChip(key, label, chipsContainer) {
  if (isTyping) return;

  // Disable all chips in this container
  if (chipsContainer) {
    chipsContainer.querySelectorAll('.chip').forEach(c => {
      c.style.pointerEvents = 'none';
      c.style.opacity = '0.5';
    });
  }

  const displayText = label || key;
  addUserMsg(displayText);
  isTyping = true;

  const scene = SCENES[currentScene];

  // Exact match on key first, then keyword match on display text
  let flow = scene.flows[key];
  if (!flow) {
    const lower = displayText.toLowerCase();
    const keywordMap = {
      '重疾': '重疾险', '重大疾病': '重疾险',
      '意外': '意外险',
      '健康': '健康险', '医疗': '健康险',
      '寿险': '寿险', '定期寿': '寿险', '终身寿': '寿险',
      '查询保单': '查询保单', '申请理赔': '申请理赔', '续期': '续期缴费',
      '保费太贵': '保费太贵了', '买错': '买错了', '直接退保': '直接退保', '服务不好': '服务不好',
    };
    for (const [kw, flowKey] of Object.entries(keywordMap)) {
      if (lower.includes(kw) && scene.flows[flowKey]) {
        flow = scene.flows[flowKey];
        break;
      }
    }
  }

  showTyping();
  setTimeout(() => {
    hideTyping();
    isTyping = false;

    if (flow) {
      flow.forEach((msg, i) => {
        setTimeout(() => addBotMsg(msg), i * 200);
      });
    } else {
      addBotMsg(scene.defaultReply);
    }
  }, 900 + Math.random() * 400);
}

// ── Manual input ──
function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  autoResize(input);
  handleChip(text, text, null);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── Init ──
loadScene('presale');
</script>
