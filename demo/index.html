<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美团保险 · 智能顾问</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 品牌色：仅用于产品 logo 区域 */
    --mt-yellow: #FFCD00;
    --mt-yellow-dark: #E6B800;

    /* 主色调：深蓝渐变 */
    --blue-deep: #0F1F5C;
    --blue-mid: #1A3A8F;
    --blue-light: #2563EB;
    --blue-accent: #3B82F6;
    --blue-pale: #EFF6FF;
    --blue-border: #BFDBFE;

    /* 金色点缀（金融质感） */
    --gold: #D4A843;
    --gold-light: #FEF3C7;

    /* 中性色 */
    --bg: #F0F4FF;
    --card: #FFFFFF;
    --text: #0F172A;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --shadow: 0 2px 16px rgba(15,31,92,0.10);
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 60%, var(--blue-light) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 16px rgba(15,31,92,0.35);
    flex-shrink: 0;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,0.6), transparent);
  }
  .header-avatar {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(212,168,67,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 700; color: #FFFFFF; }
  .header-status {
    font-size: 12px; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px; background: #4ADE80;
    border-radius: 50%; display: inline-block;
    box-shadow: 0 0 6px #4ADE80;
  }

  /* Scene tabs */
  .scene-tabs {
    display: flex; gap: 6px;
  }
  .scene-tab {
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scene-tab.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(212,168,67,0.6);
    color: #FFFFFF;
  }
  .scene-tab:not(.active) {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.65);
  }
  .scene-tab:hover:not(.active) {
    background: rgba(255,255,255,0.14);
    color: #FFFFFF;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: linear-gradient(180deg, #0F1F5C 0%, #1A3A8F 100%);
    border-right: none;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 14px 16px 8px;
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.35); letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .sidebar-item {
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; font-size: 13px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    color: rgba(255,255,255,0.55);
  }
  .sidebar-item:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.9);
  }
  .sidebar-item.active {
    background: rgba(59,130,246,0.25);
    border-left-color: var(--gold);
    color: #FFFFFF;
    font-weight: 600;
  }
  .sidebar-item .icon { font-size: 15px; width: 20px; text-align: center; opacity: 0.8; }

  .agent-badge {
    margin: 12px 16px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    border: 1px solid rgba(212,168,67,0.3);
  }
  .agent-badge-label { font-size: 10px; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .agent-badge-name { font-size: 13px; font-weight: 700; color: #FFFFFF; margin-top: 2px; }
  .agent-badge-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  /* Message bubbles */
  .msg { display: flex; gap: 10px; max-width: 80%; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
    box-shadow: 0 2px 8px rgba(37,99,235,0.35);
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
  }

  .msg-body { display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-body { align-items: flex-end; }

  .msg-name { font-size: 11px; color: var(--text-muted); padding: 0 4px; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px; line-height: 1.6;
    max-width: 100%;
  }
  .msg.bot .bubble {
    background: var(--card);
    border-radius: 4px 16px 16px 16px;
    box-shadow: var(--shadow);
    color: var(--text);
    border: 1px solid var(--blue-border);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--blue-mid) 0%, var(--blue-light) 100%);
    border-radius: 16px 4px 16px 16px;
    color: #FFFFFF;
    font-weight: 500;
    box-shadow: 0 2px 12px rgba(37,99,235,0.3);
  }

  /* Agent indicator */
  .agent-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-router { background: #EDE9FE; color: #6D28D9; }
  .tag-presale { background: var(--blue-pale); color: var(--blue-light); }
  .tag-aftersale { background: #DCFCE7; color: #15803D; }
  .tag-retention { background: #FEF3C7; color: #B45309; }

  /* Quick chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .chip {
    padding: 6px 14px; border-radius: 20px;
    background: white;
    border: 1.5px solid var(--blue-border);
    font-size: 13px; cursor: pointer; color: var(--blue-light);
    transition: all 0.15s; font-weight: 500;
  }
  .chip:hover {
    background: var(--blue-pale);
    border-color: var(--blue-accent);
    color: var(--blue-deep);
  }

  /* Product card — 仅 header 保留美团黄色品牌色 */
  .product-card {
    background: white; border-radius: 12px;
    border: 1.5px solid var(--blue-border);
    overflow: hidden; margin-top: 8px;
    box-shadow: var(--shadow);
  }
  .product-card-header {
    background: linear-gradient(135deg, var(--mt-yellow) 0%, var(--mt-yellow-dark) 100%);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .product-icon { font-size: 24px; }
  .product-name { font-size: 15px; font-weight: 700; color: #1A1A2E; }
  .product-tagline { font-size: 12px; color: #4B5563; margin-top: 1px; }
  .product-body { padding: 12px 16px; }
  .product-price {
    font-size: 22px; font-weight: 800;
    color: var(--blue-deep);
    display: flex; align-items: baseline; gap: 4px;
  }
  .product-price span { font-size: 13px; font-weight: 400; color: var(--text-muted); }
  .product-features { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .feature { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151; }
  .feature::before { content: "✓"; color: #16A34A; font-weight: 700; flex-shrink: 0; }
  .product-cta {
    margin-top: 12px; width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
    color: #FFFFFF;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .product-cta:hover { opacity: 0.88; }
  .product-cta-ready {
    background: linear-gradient(135deg, #15803D, #16A34A) !important;
    box-shadow: 0 2px 8px rgba(22,163,74,0.35) !important;
  }
  .product-cta-ready:hover { opacity: 0.88; }

  /* Policy summary card */
  .policy-card {
    background: white; border-radius: 12px;
    border: 1px solid var(--blue-border);
    padding: 14px 16px; margin-top: 8px;
    box-shadow: var(--shadow);
  }
  .policy-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid var(--bg);
    font-size: 13px;
  }
  .policy-row:last-child { border-bottom: none; }
  .policy-label { color: var(--text-muted); }
  .policy-value { font-weight: 600; color: var(--text); }
  .policy-status-badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    background: #DCFCE7; color: #15803D;
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px; background: white;
    border-radius: 4px 16px 16px 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--blue-border);
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--blue-accent);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 14px 20px 18px;
    background: var(--card);
    border-top: 1px solid var(--blue-border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-box {
    flex: 1; padding: 11px 16px;
    border: 1.5px solid var(--blue-border);
    border-radius: 24px; font-size: 14px;
    outline: none; resize: none;
    font-family: inherit; line-height: 1.5;
    max-height: 100px; overflow-y: auto;
    transition: border-color 0.2s, box-shadow 0.2s;
    color: var(--text);
    background: var(--blue-pale);
  }
  .input-box:focus {
    border-color: var(--blue-accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    background: #FFFFFF;
  }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; color: white;
    transition: all 0.15s;
    box-shadow: 0 2px 10px rgba(37,99,235,0.4);
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(37,99,235,0.5); }
  .send-btn:active { transform: scale(0.95); }

  /* Disclaimer */
  .disclaimer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 8px;
  }

  /* System message */
  .sys-msg {
    text-align: center; font-size: 12px; color: var(--text-muted);
    padding: 4px 12px; background: white;
    border-radius: 20px; align-self: center;
    border: 1px solid var(--blue-border);
    box-shadow: 0 1px 4px rgba(15,31,92,0.06);
  }

  /* Scrollbar */
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--blue-border); border-radius: 2px; }

  /* Fade in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg, .sys-msg { animation: fadeUp 0.25s ease; }
</style>
</head>

// ── State ──
let currentScene = 'presale';
let isTyping = false;
// 记录用户当前正在咨询的险种，用于上下文感知的关键词匹配
let currentInsuranceType = null; // 'accident' | 'ci' | 'health' | 'life'
// 记录各险种核保是否已通过，通过后产品卡片直接显示「立即投保」
let underwritingPassed = {}; // { accident: true, ci: true, ... }

// ── DOM helpers ──
const $msgs = () => document.getElementById('messages');

function scrollBottom() {
  const el = $msgs();
  setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

function addSysMsg(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  $msgs().appendChild(el);
  scrollBottom();
}

function getTagClass(tag) {
  return { presale: 'tag-presale', aftersale: 'tag-aftersale', retention: 'tag-retention', router: 'tag-router' }[tag] || 'tag-router';
}

function addBotMsg(msg) {
  // 核保通过时记录状态
  if (msg.underwritingPass) {
    underwritingPassed[msg.underwritingPass] = true;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg bot';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const body = document.createElement('div');
  body.className = 'msg-body';

  if (msg.tag) {
    const tag = document.createElement('div');
    tag.className = 'agent-tag ' + getTagClass(msg.tag);
    tag.textContent = msg.tagLabel || msg.tag;
    body.appendChild(tag);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(msg.text);
  body.appendChild(bubble);

  // Product card
  if (msg.card) {
    // Infer insurance type from first chip key to route card button to correct underwriting flow
    const underwritingKey = msg.cardUnderwriting || (msg.chips && msg.chips[0]) || '核保:意外险';
    const card = buildProductCard(msg.card, underwritingKey);
    body.appendChild(card);
  }

  // Text 2 (after card)
  if (msg.text2) {
    const b2 = document.createElement('div');
    b2.className = 'bubble';
    b2.innerHTML = formatText(msg.text2);
    body.appendChild(b2);
  }

  // Policy card
  if (msg.policy) {
    const pc = buildPolicyCard(msg.policy);
    body.appendChild(pc);
  }

  // Chips — chips[] are the flow keys, chipLabels[] are the display text
  if (msg.chips && msg.chips.length) {
    const chipsEl = document.createElement('div');
    chipsEl.className = 'chips';
    msg.chips.forEach((key, i) => {
      const label = (msg.chipLabels && msg.chipLabels[i]) ? msg.chipLabels[i] : key;
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = label;
      chip.onclick = () => handleChip(key, label, chipsEl);
      chipsEl.appendChild(chip);
    });
    body.appendChild(chipsEl);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(body);
  $msgs().appendChild(wrap);
  scrollBottom();
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '👤';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  body.appendChild(bubble);

  wrap.appendChild(body);
  wrap.appendChild(avatar);
  $msgs().appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const typing = document.createElement('div');
  typing.className = 'typing';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'typing-dot';
    typing.appendChild(dot);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(typing);
  $msgs().appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function buildProductCard(card, insuranceType) {
  insuranceType = insuranceType || '核保:意外险';

  // 判断该险种是否已通过核保
  const insTypeMap = {
    '核保:意外险': 'accident', '意外险': 'accident',
    '了解理赔流程': 'ci',      '重疾险': 'ci',
    '了解健康告知': 'health',  '健康险': 'health',
    '核保:寿险': 'life',       '寿险': 'life',
  };
  const insType = insTypeMap[insuranceType];
  const passed = insType && underwritingPassed[insType];

  // 已通过核保：直接跳购买 flow；否则走核保流程
  const purchaseKeyMap = {
    accident: '意外险购买', ci: '重疾险购买', health: '健康险购买', life: '寿险购买',
  };
  const btnKey   = passed ? purchaseKeyMap[insType] : insuranceType;
  const btnLabel = passed ? '立即投保' : '确认投保资格';
  const btnClass = passed ? 'product-cta product-cta-ready' : 'product-cta';

  const c = document.createElement('div');
  c.className = 'product-card';
  c.innerHTML = `
    <div class="product-card-header">
      <div class="product-icon">${card.icon}</div>
      <div>
        <div class="product-name">${card.name}</div>
        <div class="product-tagline">${card.tagline}</div>
      </div>
    </div>
    <div class="product-body">
      <div class="product-price">${card.price}<span>${card.unit}</span></div>
      <div class="product-features">
        ${card.features.map(f => `<div class="feature">${f}</div>`).join('')}
      </div>
      <button class="${btnClass}" onclick="handleChip('${btnKey}', '${btnLabel}', null)">${passed ? '✅ ' : ''}${btnLabel}</button>
    </div>
  `;
  return c;
}

function buildPolicyCard(policy) {
  const c = document.createElement('div');
  c.className = 'policy-card';
  c.innerHTML = policy.rows.map(r => `
    <div class="policy-row">
      <span class="policy-label">${r.label}</span>
      ${r.isStatus
        ? `<span class="policy-value"><span class="policy-status-badge">有效</span></span>`
        : `<span class="policy-value">${r.value}</span>`
      }
    </div>
  `).join('');
  return c;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="background:#EFF6FF;color:#1D4ED8;padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace;border:1px solid #BFDBFE">$1</code>')
    .replace(/\n/g, '<br>');
}

// ── Sidebar nav ──
function setNav(activeId) {
  ['nav-router','nav-presale','nav-aftersale','nav-retention'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', id === activeId);
  });
}

function updateBadge(scene) {
  const s = SCENES[scene];
  document.getElementById('badge-name').textContent = s.agentName;
  document.getElementById('badge-desc').textContent = s.agentDesc;
}

// ── Scene loading ──
function loadScene(scene, keepMessages) {
  currentScene = scene;

  if (!keepMessages) {
    $msgs().innerHTML = '';
  }

  const s = SCENES[scene];
  setNav('nav-router');
  updateBadge(scene);

  // Play greeting
  let delay = 0;
  s.greeting.forEach(msg => {
    setTimeout(() => {
      if (msg.type === 'sys') {
        addSysMsg(msg.text);
      } else {
        showTyping();
        setTimeout(() => {
          hideTyping();
          setNav(s.navActive);
          addBotMsg(msg);
        }, 800);
      }
    }, delay);
    delay += msg.type === 'sys' ? 400 : 1400;
  });
}

// ── Router: 意图识别后路由到目标场景 ──
const INTENT_ROUTES = {
  '我想买保险': 'presale',
  '查询我的保单': 'aftersale',
  '我想退保': 'retention',
};
const INTENT_KEYWORDS = [
  { kws: ['买保险','购买','投保','推荐','想买','了解保险','重疾','意外险','健康险','寿险','宝宝险','儿童险','少儿险','配置建议'], scene: 'presale' },
  { kws: ['保单','查询','理赔','续期','缴费','查一下'], scene: 'aftersale' },
  { kws: ['退保','退款','不想续','取消保险'], scene: 'retention' },
];

function routeToScene(key, displayText) {
  // 精确匹配
  let target = INTENT_ROUTES[key];
  // 关键词匹配
  if (!target) {
    const lower = displayText.toLowerCase();
    for (const rule of INTENT_KEYWORDS) {
      if (rule.kws.some(kw => lower.includes(kw))) {
        target = rule.scene;
        break;
      }
    }
  }
  if (!target) return false;

  const confidenceMap = { presale: '0.94', aftersale: '0.89', retention: '0.91' };
  const labelMap = { presale: '售前', aftersale: '售后', retention: '退保挽留' };

  addSysMsg(`Router Agent 意图识别: ${labelMap[target]} (置信度 ${confidenceMap[target]}) → 移交对应 Agent`);
  setTimeout(() => loadScene(target, true), 600);
  return true;
}

// ── Chip handler ──
// key: flow lookup key; label: display text shown in user bubble (defaults to key)
function handleChip(key, label, chipsContainer) {
  if (isTyping) return;

  // Disable all chips in this container
  if (chipsContainer) {
    chipsContainer.querySelectorAll('.chip').forEach(c => {
      c.style.pointerEvents = 'none';
      c.style.opacity = '0.5';
    });
  }

  const displayText = label || key;
  addUserMsg(displayText);
  isTyping = true;

  // 在 router 场景下，先尝试意图路由
  if (currentScene === 'router') {
    isTyping = false;
    showTyping();
    setTimeout(() => {
      hideTyping();
      if (!routeToScene(key, displayText)) {
        // 未识别意图，兜底提示
        addBotMsg({
          tag: 'router', tagLabel: 'Router',
          text: '我来帮您找到合适的服务，请问您是想：',
          chips: ['我想买保险', '查询我的保单', '我想退保']
        });
      }
    }, 800);
    return;
  }

  const scene = SCENES[currentScene];

  // retention / aftersale 场景：精确匹配即可，不走险种上下文逻辑
  // 这两个场景的 flows key 都是精确中文短语，直接走第一步精确匹配
  // 只有 presale 需要复杂的上下文感知关键词匹配

  // 更新险种上下文（识别到险种 key 时记录）
  const insuranceTypeMap = {
    '意外险': 'accident', '核保:意外险': 'accident', '理赔详情:意外险': 'accident',
    '重疾险': 'ci',       '了解理赔流程': 'ci',       '理赔详情:重疾险': 'ci',
    '健康险': 'health',   '了解健康告知': 'health',   '理赔详情:健康险': 'health',
    '寿险':   'life',     '核保:寿险': 'life',        '理赔详情:寿险': 'life',
  };
  if (insuranceTypeMap[key]) currentInsuranceType = insuranceTypeMap[key];

  // 险种上下文 → 对应的理赔/核保/对比 flow key
  const ctxFlowMap = {
    accident: { claim: '理赔详情:意外险', underwrite: '核保:意外险',   compare: '对比竞品:意外险' },
    ci:       { claim: '理赔详情:重疾险', underwrite: '了解理赔流程',   compare: '对比竞品:重疾险' },
    health:   { claim: '理赔详情:健康险', underwrite: '了解健康告知',   compare: '对比竞品:健康险' },
    life:     { claim: '理赔详情:寿险',   underwrite: '核保:寿险',      compare: '对比竞品:寿险'   },
  };

  // Exact match first
  let flow = scene.flows[key];

  // Keyword match — context-aware
  if (!flow) {
    const lower = displayText.toLowerCase();
    const ctx = currentInsuranceType && ctxFlowMap[currentInsuranceType];

    // 险种切换关键词
    const typeKeywords = [
      { kws: ['重疾', '重大疾病'], type: 'ci',       flowKey: '重疾险' },
      { kws: ['意外'],             type: 'accident',  flowKey: '意外险' },
      { kws: ['健康险', '医疗险', '百万医疗'], type: 'health', flowKey: '健康险' },
      { kws: ['寿险', '定期寿', '终身寿'],    type: 'life',   flowKey: '寿险' },
    ];
    for (const { kws, type, flowKey } of typeKeywords) {
      if (kws.some(kw => lower.includes(kw)) && scene.flows[flowKey]) {
        currentInsuranceType = type;
        flow = scene.flows[flowKey];
        break;
      }
    }

    // 意图关键词 — 优先结合当前险种上下文
    if (!flow && ctx) {
      const intentMap = [
        { kws: ['理赔', '怎么赔', '如何赔', '赔付', '出险', '报销', '申请赔'], flowKey: ctx.claim },
        { kws: ['核保', '投保资格', '能不能买', '能买吗', '健康告知', '可以投保', '符合条件'], flowKey: ctx.underwrite },
        { kws: ['对比', '竞品', '比较', '哪个好', '其他保司', '平安', '太平洋', '友邦'], flowKey: ctx.compare },
        { kws: ['保费', '多少钱', '价格', '费率'], flowKey: null }, // 已在产品卡片展示，不另设 flow
      ];
      for (const { kws, flowKey } of intentMap) {
        if (kws.some(kw => lower.includes(kw))) {
          if (flowKey && scene.flows[flowKey]) {
            flow = scene.flows[flowKey];
          }
          break;
        }
      }
    }

    // 售后/退保关键词
    if (!flow) {
      const crossMap = [
        { kws: ['查询保单', '我的保单', '查保单'],   flowKey: '查询保单' },
        { kws: ['续期', '缴费', '续费'],             flowKey: '续期缴费' },
        { kws: ['保费太贵', '太贵', '贵了'],         flowKey: '保费太贵了' },
        { kws: ['买错', '买错了', '买错产品'],       flowKey: '买错了' },
        { kws: ['退保', '办理退保', '申请退保'],     flowKey: '直接退保' },
        { kws: ['服务不好', '服务差', '体验差'],     flowKey: '服务不好' },
        { kws: ['不需要', '不想要', '用不上'],       flowKey: '不需要了' },
        { kws: ['暂停', '暂停保单', '先暂停'],       flowKey: '暂停保单' },
        { kws: ['申请理赔', '提交理赔', '理赔申请'], flowKey: '申请理赔' },
      ];
      for (const { kws, flowKey } of crossMap) {
        if (kws.some(kw => lower.includes(kw)) && scene.flows[flowKey]) {
          flow = scene.flows[flowKey];
          break;
        }
      }
    }
  }

  showTyping();
  setTimeout(() => {
    hideTyping();
    isTyping = false;

    if (flow) {
      flow.forEach((msg, i) => {
        setTimeout(() => addBotMsg(msg), i * 200);
      });
    } else {
      // 兜底：无法识别意图，转人工
      addBotMsg({
        tag: 'presale', tagLabel: '售前顾问',
        text: '抱歉，我暂时无法准确回答您的问题 😔\n\n为了给您提供更准确的服务，建议转接人工客服。',
        chips: ['联系人工客服', '还有其他问题'],
      });
    }
  }, 900 + Math.random() * 400);
}

// ── Manual input ──
function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  autoResize(input);
  handleChip(text, text, null);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
